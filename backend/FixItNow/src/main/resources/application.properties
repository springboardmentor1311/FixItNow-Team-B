# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Database Configuration
# Default is a file-based H2 DB so backend can run with zero local setup.
# Override these via env vars for external DBs (for MySQL, see application-mysql.properties).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fixitnow;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# Data Initialization
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.continue-on-error=true

# JWT Configuration
app.jwtSecret=${APP_JWT_SECRET:Zml4aXRub3dfanVzdF9hX3ZlcnlfbG9uZ19zZWN1cmVfanN3dF9rZXlfMzJieXRlcw==}
app.jwtExpirationMs=${APP_JWT_EXPIRATION_MS:86400000}

# Logging Configuration
logging.level.root=INFO
logging.level.com.fixitnow=DEBUG
logging.level.org.springframework.security=DEBUG

# Application Configuration
app.name=FixItNow
app.version=1.0.0

# Google Maps Configuration
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
google.maps.api.endpoint=https://maps.googleapis.com/maps/api
